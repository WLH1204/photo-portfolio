name = "photo-portfolio-api"
main = "index.js"
compatibility_date = "2024-01-01"

# 环境变量（部署前在 Cloudflare Dashboard 设置，或取消注释在这里填写）
# [vars]
# API_TOKEN = "你的API密钥"
# API_PASSWORD = "你的访问密码"

# R2 存储桶绑定
[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "photo-portfolio"  # 改为你的桶名

# KV 命名空间绑定
[[kv_namespaces]]
binding = "SETTINGS_KV"
id = "你的KV命名空间ID"  # 部署后替换

# 生产环境路由（可选，使用自定义域名时配置）
# routes = ["api.yourdomain.com/*"]
